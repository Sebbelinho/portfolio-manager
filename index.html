<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#6366f1" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="Portfolio-Analyse & CapEx-Frühwarnsystem" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <title>AI Infrastructure Monitor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0e1a; color: #e2e8f0; font-family: 'DM Sans', system-ui, sans-serif; -webkit-font-smoothing: antialiased; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
    * { -webkit-tap-highlight-color: transparent; }
    .m { font-family: 'JetBrains Mono', monospace; }
    ::selection { background: #6366f155; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    @keyframes earningsPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.85;transform:scale(1.02)} }
    @keyframes infoPanelIn { from { opacity:0; transform:translateY(-6px); max-height:0; } to { opacity:1; transform:translateY(0); max-height:1200px; } }
    .info-panel { animation: infoPanelIn .22s ease-out; overflow: hidden; }
    .info-hint { transition: color .15s, border-color .15s, background .15s; pointer-events: none; }
    .has-info { cursor: pointer; }
    .has-info:hover .info-hint { color: #cbd5e1; border-color: #64748b; background: #1e293b; }
    @keyframes bucketTileIn { from { opacity:0; transform:scale(.7) translateY(-4px); } to { opacity:1; transform:scale(1) translateY(0); } }
    @keyframes bucketPillIn { from { opacity:0; transform:scale(.6); } to { opacity:1; transform:scale(1); } }
    .bucket-tile { animation: bucketTileIn .22s cubic-bezier(.34,1.56,.64,1); transition: transform .12s ease, box-shadow .15s ease, border-color .15s ease; touch-action: manipulation; }
    .bucket-edge { transition: filter .12s ease, background .12s ease; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    .bucket-edge:active { transform: scale(.92); filter: brightness(1.8); }
    .bucket-pill { animation: bucketPillIn .28s cubic-bezier(.34,1.56,.64,1); transition: background .2s, color .2s, border-color .2s; }
    .bucket-reset { transition: transform .15s ease, background .15s ease, border-color .15s ease; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    .bucket-reset svg { transition: transform .25s ease; }
    .bucket-reset:active { transform: scale(.95); background: #334155 !important; }
    .bucket-box { transition: border-color .2s ease, box-shadow .2s ease; }
    .bucket-name { transition: color .15s ease, transform .15s ease; -webkit-tap-highlight-color: transparent; }
    @media (hover: hover) {
      .bucket-tile:hover { transform: translateY(-1px); box-shadow: 0 6px 14px #00000055; }
      .bucket-edge:hover { filter: brightness(1.6); }
      .bucket-reset:hover { background: #334155 !important; border-color: #475569 !important; }
      .bucket-reset:hover svg { transform: scale(1.15); }
      .bucket-name:hover { transform: scale(1.05); }
    }
    @media (max-width: 600px) {
      .bucket-row { gap: 4px !important; }
      .bucket-box { padding: 6px !important; }
      .bucket-edge { min-width: 22px !important; }
      .bucket-tile span.m { font-size: 12px !important; padding: 11px 2px !important; }
      .bucket-pill { font-size: 11px !important; padding: 3px 10px !important; }
      .bucket-reset { padding: 6px 12px !important; }
    }
    input, select, button { font-family: inherit; }
    input:focus, select:focus { outline: 1px solid #6366f1; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #111827; }
    ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    .tab-strip::-webkit-scrollbar { display: none; }
    .tab-strip { -ms-overflow-style: none; scrollbar-width: none; }
    button:not(:disabled) { transition: opacity 0.15s, filter 0.15s, transform 0.1s; }
    button:not(:disabled):hover { filter: brightness(1.15); }
    button:not(:disabled):active { transform: scale(0.97); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" src="app.jsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js', { updateViaCache: 'none' }).then(reg => {
          // Check for SW updates every 10 seconds
          setInterval(() => reg.update().catch(() => {}), 10000);
        }).catch(() => {});
      });
    }
  </script>
</body>
</html>
